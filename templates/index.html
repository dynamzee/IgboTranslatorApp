<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyna Translator App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>DYNA's TRANSLATOR APP</h2>

    <textarea id="inputText" placeholder="Enter English or Igbo text here..."></textarea>
    <button onclick="translateText()">Translate</button>

    <div id="result">Translation will appear here...</div>

    <div class="feedback-section">
        <p><strong>Help us improve!</strong> Suggest a better translation:</p>
        <input type="text" id="userSuggestion" class="feedback-input" placeholder="Your suggested translation">
        <button class="suggestion_correct_button" onclick="sendFeedback()">Send Correction</button>
    </div>
</div>

<script>
    async function translateText() {
        const text = document.getElementById('inputText').value;
        const resultDiv = document.getElementById('result');
        if (!text) return;

        resultDiv.innerText = "Translating...";

        try {
            const response = await fetch('/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();
            resultDiv.innerText = data.translation;
        } catch (error) {
            resultDiv.innerText = "Error connecting to server.";
            console.error("Translation error:", error);
        }
    }

    async function sendFeedback() {
        const original = document.getElementById('inputText').value;
        const user_input = document.getElementById('userSuggestion').value;
        const submitBtn = document.querySelector('.suggestion_correct_button');

        if (!original || !user_input) {
            alert("Please provide both the original text and your suggestion.");
            return;
        }

        // Visual feedback so user knows it's working
        const originalBtnText = submitBtn.innerText;
        submitBtn.innerText = "Sending...";
        submitBtn.disabled = true;

        try {
            const response = await fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    original: original,
                    user_input: user_input
                })
            });

            const data = await response.json();

            // Handle the specific success/error status from mainapp.py
            if (data.status === "success") {
                alert(data.message);
                document.getElementById('userSuggestion').value = "";
            } else {
                alert("Error: " + data.message);
            }
        } catch (error) {
            alert("Failed to connect to the email service.");
            console.error("Feedback error:", error);
        } finally {
            // Restore button
            submitBtn.innerText = originalBtnText;
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
